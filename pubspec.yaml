name: naviscope
description: GNSS telemetry instrument — live satellite and location data for Android and iOS.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Location
  geolocator: ^13.0.2
  flutter_compass: ^0.8.1

  # Map
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Charts
  fl_chart: ^0.70.2

  # Permissions
  permission_handler: ^11.3.1

  # Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.2

flutter:
  generate: true
  uses-material-design: true
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
  assets:
    - assets/fonts/
